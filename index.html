<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>On This Day — History Timeline</title>
  <meta name="description" content="Explore history through a zoomable timeline. Drill from centuries down to individual days and discover curated historical events.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <!-- Grain overlay for parchment texture -->
  <div class="grain-overlay" aria-hidden="true"></div>

  <!-- Context box — always shows current zoom level -->
  <div id="context-box" class="context-box">
    <button id="back-btn" class="back-btn" title="Go back one level" aria-label="Go back one level">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <div class="context-content">
      <span id="context-label" class="context-label">All Centuries</span>
      <span id="context-sublabel" class="context-sublabel"></span>
    </div>
  </div>

  <!-- Keyboard hint -->
  <div id="keyboard-hint" class="keyboard-hint">
    <span class="key">←</span><span class="key">→</span> scroll
    <span class="separator">·</span>
    <span class="key">Enter</span> zoom in
    <span class="separator">·</span>
    <span class="key">Esc</span> zoom out
  </div>

  <!-- Main timeline area -->
  <div id="timeline-viewport" class="timeline-viewport">
    <!-- Left edge-scroll zone -->
    <div class="edge-zone edge-zone--left" data-direction="-1" aria-hidden="true"></div>

    <!-- Timeline rail -->
    <div id="timeline-rail" class="timeline-rail">
      <!-- Items injected by JS -->
    </div>

    <!-- Right edge-scroll zone -->
    <div class="edge-zone edge-zone--right" data-direction="1" aria-hidden="true"></div>

    <!-- Center highlight marker -->
    <div class="center-marker" aria-hidden="true"></div>
  </div>

  <!-- Event display panel -->
  <div id="event-panel" class="event-panel">
    <div id="event-content" class="event-content">
      <div class="event-illustration" id="event-illustration">
        <!-- Category illustration SVG injected here -->
      </div>
      <div class="event-details">
        <h2 id="event-title" class="event-title">Select an era to begin</h2>
        <p id="event-description" class="event-description">Navigate the timeline above. Click a century to explore its years, click a year for its months, and a month for individual days.</p>
        <a id="event-link" class="event-link" href="#" target="_blank" rel="noopener noreferrer" style="display:none">
          Read more on Wikipedia
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        </a>
      </div>
    </div>
  </div>

  <!-- Zoom level indicator -->
  <div id="zoom-breadcrumb" class="zoom-breadcrumb">
    <span class="zoom-dot zoom-dot--active" data-level="century" title="Centuries"></span>
    <span class="zoom-connector"></span>
    <span class="zoom-dot" data-level="year" title="Years"></span>
    <span class="zoom-connector"></span>
    <span class="zoom-dot" data-level="month" title="Months"></span>
    <span class="zoom-connector"></span>
    <span class="zoom-dot" data-level="day" title="Days"></span>
  </div>

  <script src="data.js"></script>
  <script src="illustrations.js"></script>
  <script src="app.js"></script>
</body>
</html>
